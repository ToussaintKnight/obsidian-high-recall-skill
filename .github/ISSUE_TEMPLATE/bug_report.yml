name: Bug report
description: Report an install, indexing, search, or evaluation bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste private note snippets, private note paths, vault names, tokens, or local usernames. Use the fixture vault if possible.
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true
  - type: input
    id: obsidian
    attributes:
      label: Obsidian and Smart Connections status
      placeholder: "Obsidian version, Smart Connections installed/indexed?"
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Redact vault paths and note names.
      render: shell
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      render: text
