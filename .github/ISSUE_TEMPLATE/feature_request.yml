name: Feature request
description: Suggest a capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste private note paths, vault names, note snippets, raw queries, gold labels, tokens, or local usernames.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI/install
        - Codex skill
        - Smart Connections backend
        - OHS backend
        - Evaluator/benchmark
        - Documentation
        - Privacy/security
  - type: textarea
    id: notes
    attributes:
      label: Additional context
