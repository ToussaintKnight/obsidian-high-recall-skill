name: Publish npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Expected release tag, for example v0.2.0"
        required: true
        default: "v0.2.0"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Validate package version and release tag
        run: |
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const expected='v'+pkg.version; if (process.env.RELEASE_TAG !== expected) { throw new Error(`Release tag ${process.env.RELEASE_TAG} must match package version ${expected}`); }"

      - name: Test and privacy gates
        run: |
          npm test
          npm run privacy:scan
          npm run publish:check

      - name: Guard package version is unpublished
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "obsidian-high-recall@$VERSION" version >/dev/null 2>&1; then
            echo "obsidian-high-recall@$VERSION is already published."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
